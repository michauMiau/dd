<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="cs/favicon.jpg">
    <title>CS2 — Komendy</title>
    <style>
        /* ============================================
           CSS — Stylesheet (modularny)
           ============================================ */

        :root {
            --orange: #ff8c42;
            --orange-dark: #e06f25;
            --blue: #3a86ff;
            --blue-dark: #2563eb;
            --bg: #0d1117;
            --card-bg: #161b22;
            --card-border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --input-bg: #0d1117;
            --success: #3fb950;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Rajdhani', system-ui, -apple-system, sans-serif;
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* --- Tapeta CS gradient z paskami --- */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                repeating-linear-gradient(
                    -45deg,
                    transparent,
                    transparent 30px,
                    rgba(255, 140, 66, 0.03) 30px,
                    rgba(255, 140, 66, 0.03) 32px
                ),
                repeating-linear-gradient(
                    -45deg,
                    transparent,
                    transparent 60px,
                    rgba(58, 134, 255, 0.03) 60px,
                    rgba(58, 134, 255, 0.03) 62px
                ),
                linear-gradient(
                    135deg,
                    #0a0e14 0%,
                    #0d1117 30%,
                    #0f1520 60%,
                    #0a0e14 100%
                );
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 32px 24px;
        }

         /* --- Nagłówek z gradientem na każdej literze (JS) --- */
        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .h1-letter {
            display: inline-block;
            transition: color 0.3s ease;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 28px;
        }

        /* --- Wyszukiwarka --- */
        .search-wrapper {
            position: relative;
            margin-bottom: 24px;
            animation: fadeSlideDown 0.5s ease-out;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            font-size: 1rem;
            border: 2px solid var(--card-border);
            border-radius: 12px;
            background: var(--input-bg);
            color: var(--text);
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .search-input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 4px rgba(58, 134, 255, 0.15);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.2rem;
            pointer-events: none;
        }

        /* --- Filtry kategorii --- */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
            animation: fadeSlideDown 0.5s ease-out 0.1s both;
        }

        .filter-btn {
            padding: 6px 16px;
            font-size: 0.85rem;
            border: 1.5px solid var(--card-border);
            border-radius: 20px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .filter-btn:hover {
            border-color: var(--blue);
            color: var(--blue);
        }

        .filter-btn.active {
            background: var(--blue);
            border-color: var(--blue);
            color: #fff;
        }

        /* --- Quickgames --- */
        .quickgames-section {
            margin-bottom: 28px;
            animation: fadeSlideDown 0.5s ease-out 0.15s both;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title .icon { color: var(--orange); }

        .quickgames-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .quickgame-item {
            padding: 14px 18px;
            background: var(--card-bg);
            border: 1.5px solid var(--card-border);
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            transition: border-color 0.2s, transform 0.15s;
        }

        .quickgame-item:hover {
            border-color: var(--orange);
            transform: translateY(-1px);
        }

        .quickgame-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .quickgame-name {
            font-size: 0.95rem;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .quickgame-cmd {
            display: block;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 0.82rem;
            color: var(--orange);
            background: rgba(255, 140, 66, 0.08);
            padding: 4px 10px;
            border-radius: 6px;
            white-space: nowrap;
            overflow-x: auto;
            scrollbar-width: thin;
        }

        .quickgame-cmd::-webkit-scrollbar { height: 4px; }
        .quickgame-cmd::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 2px; }

        /* --- Lista komend --- */
        .commands-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .command-card {
            background: var(--card-bg);
            border: 1.5px solid var(--card-border);
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: border-color 0.2s, transform 0.15s, opacity 0.3s;
        }

        .command-card:hover {
            border-color: var(--blue);
            transform: translateY(-1px);
        }

        .cmd-info { flex: 1; min-width: 0; }

        .cmd-text {
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 0.95rem;
            color: var(--orange);
            word-break: break-all;
        }

        .cmd-desc {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .cmd-category {
            display: inline-block;
            padding: 2px 10px;
            font-size: 0.72rem;
            border-radius: 12px;
            background: rgba(58, 134, 255, 0.15);
            color: var(--blue);
            margin-top: 5px;
        }

        .copy-btn {
            flex-shrink: 0;
            padding: 8px 14px;
            font-size: 0.82rem;
            border: 1.5px solid var(--card-border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .copy-btn:hover {
            border-color: var(--success);
            color: var(--success);
        }

         .copy-btn.copied {
            border-color: var(--success);
            background: rgba(63, 185, 80, 0.12);
            color: var(--success);
        }

        /* --- Przyciski top (FAQ / Donate) --- */
        .top-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            animation: fadeSlideDown 0.5s ease-out 0.1s both;
        }

        .top-btn {
            padding: 8px 20px;
            font-size: 0.9rem;
            border: 1.5px solid var(--card-border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .top-btn:hover {
            border-color: var(--orange);
            color: var(--orange);
        }

        /* --- Modal --- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active { display: flex; }

        .modal-box {
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 16px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 1.4rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .modal-close:hover { color: var(--text); }

        .faq-item {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--card-border);
        }

        .faq-item:last-child { border-bottom: none; margin-bottom: 0; }

        .faq-question {
            font-size: 1rem;
            font-weight: 600;
            color: var(--orange);
            margin-bottom: 8px;
        }

        .faq-answer {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .donate-methods {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .donate-method {
            flex: 1;
            padding: 14px;
            border: 1.5px solid var(--card-border);
            border-radius: 10px;
            text-align: center;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .donate-method:hover {
            border-color: var(--orange);
            color: var(--orange);
        }

        .donate-icon { font-size: 1.5rem; display: block; margin-bottom: 6px; }

        /* --- Brak wyników --- */
        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            display: none;
        }

        .no-results.visible { display: block; animation: fadeIn 0.3s ease-out; }

        /* --- Animacje --- */
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* --- Ładowanie --- */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        @media (max-width: 500px) {
            h1 { font-size: 1.5rem; }
            .container { padding: 20px 14px; }
            .quickgames-grid { grid-template-columns: 1fr; }
            .command-card { flex-wrap: wrap; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="mainTitle"></h1>
    <p class="subtitle">Wyszukaj, skopiuj i wklej do konsoli! Bez reklam, szybkie</p>

    <!-- Przyciski FAQ i Donate -->
    <div class="top-buttons" id="topButtons"></div>

    <!-- Wyszukiwarka -->
    <div class="search-wrapper">
        <span class="search-icon">&#128269;</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Szukaj komendy, opisu lub kategorii...">
    </div>

    <!-- Filtry kategorii -->
    <div class="filter-bar" id="filterBar"></div>

    <!-- Quickgames (renderowane dynamicznie) -->
    <div class="quickgames-section" id="quickgamesSection">
        <div class="section-title"><span class="icon">&#9889;</span> Quickgames</div>
        <div class="quickgames-grid" id="quickgamesGrid"></div>
    </div>

    <!-- Lista komend -->
    <div class="commands-list" id="commandsList"></div>

    <!-- Brak wyników -->
    <div class="no-results" id="noResults">Brak wyników wyszukiwania 😿</div>

    <!-- Ładowanie -->
    <div class="loading" id="loading">Ładowanie komend... 🐾</div>

    <!-- Modal FAQ -->
    <div class="modal-overlay" id="faqModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeFaq()">&times;</button>
            <h2 class="modal-title"><span style="color: var(--orange);">❓</span> FAQ — Najczęściej zadawane pytania</h2>
            <div id="faqContent"></div>
        </div>
    </div>

    <!-- Modal Donate -->
    <div class="modal-overlay" id="donateModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeDonate()">&times;</button>
            <h2 class="modal-title"><span style="color: var(--orange);">💛</span> <span id="donateTitle"></span></h2>
            <p class="faq-answer" id="donateDesc"></p>
            <div class="donate-methods" id="donateMethods"></div>
        </div>
    </div>

    <!-- Modal Close Overlay -->
    <script>
        function closeFaq() { document.getElementById('faqModal').classList.remove('active'); }
        function closeDonate() { document.getElementById('donateModal').classList.remove('active'); }
        
        // Zamknij modal po kliknięciu w tło
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal-overlay')) {
                e.target.classList.remove('active');
            }
        });

        // Escape key zamknięcie
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeFaq();
                closeDonate();
            }
        });
    </script>
</div>


<!-- ============================================
     JS — Modularny (moduły: data, render, filter, utils)
     ============================================ -->
<script type="module">

// --- MODUŁ 1: Ładowanie danych z pliku JSON ---
const DATA_URL = 'cs/con_pl.json';

async function loadCommands() {
    try {
        const res = await fetch(DATA_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
    } catch (err) {
        console.error('Nie udało się załadować komend:', err);
        document.getElementById('loading').textContent = 'Błąd ładowania danych 😿';
        return [];
    }
}


// --- MODUŁ 2: Renderowanie (UI) ---

const searchInput   = document.getElementById('searchInput');
const filterBar     = document.getElementById('filterBar');
const commandsList  = document.getElementById('commandsList');
const quickgamesGrid= document.getElementById('quickgamesGrid');
const quickgamesSection = document.getElementById('quickgamesSection');
const noResults     = document.getElementById('noResults');
const loadingEl     = document.getElementById('loading');

let activeCategory = 'Wszystkie';


function renderQuickgames(commands) {
    const qgs = commands.filter(c => c.cat === 'quickgames');
    if (qgs.length === 0) { quickgamesSection.style.display = 'none'; return; }

    quickgamesSection.style.display = 'block';
    quickgamesGrid.innerHTML = '';
    qgs.forEach((q, i) => {
        const el = document.createElement('div');
        el.className = 'quickgame-item';
        el.style.animationDelay = `${i * 0.05}s`;
        el.innerHTML = `
            <div class="quickgame-info">
                <span class="quickgame-name">${escapeHtml(q.desc)}</span>
                <code class="quickgame-cmd" title="${escapeHtml(q.cmd)}">${escapeHtml(q.cmd)}</code>
            </div>
            <button class="copy-btn" data-copy="${escapeHtml(q.cmd)}">Kopiuj</button>
        `;
        quickgamesGrid.appendChild(el);
    });

    // Przypisz copy handler do nowych przycisków
    quickgamesGrid.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', handleCopy);
    });
}


function getCategories(commands) {
    const cats = new Set();
    commands.forEach(c => cats.add(c.cat));
    return ['Wszystkie', ...Array.from(cats).sort((a,b) => a === 'quickgames' ? -1 : b === 'quickgames' ? 1 : a.localeCompare(b))];
}


function renderFilters(commands) {
    filterBar.innerHTML = '';
    getCategories(commands).forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (cat === activeCategory ? ' active' : '');
        btn.textContent = cat;
        btn.addEventListener('click', () => {
            activeCategory = cat;
            renderFilters(commands);
            filterCommands(commands);
        });
        filterBar.appendChild(btn);
    });
}


function renderCommands(filtered, animate) {
  commandsList.innerHTML = '';

  if (filtered.length === 0) {
      noResults.classList.add('visible');
      return;
  }
  noResults.classList.remove('visible');

  // Grupuj komendy po kategoriach
  const grouped = {};
  filtered.forEach(c => {
      if (!grouped[c.cat]) grouped[c.cat] = [];
      grouped[c.cat].push(c);
  });

  // Ikony kategorii
  const catIcons = {
      'Ogólne': '&#128203;',
      'Rozgrywka': '&#9975;',
      'Cheats': '&#128640;',
      'Grafika': '&#127912;',
      'Audio': '&#127908;',
      'Sieć': '&#128268;',
      'Multiplayer': '&#128101;',
      'Demo': '&#128394;',
  };

  const catOrder = ['Ogólne', 'Rozgrywka', 'Cheats', 'Grafika', 'Audio', 'Sieć', 'Multiplayer', 'Demo'];

  // Sortuj kategorie — najpierw te z order, potem reszta alfabetycznie
  const sortedCats = Object.keys(grouped).sort((a, b) => {
      const aIdx = catOrder.indexOf(a);
      const bIdx = catOrder.indexOf(b);
      if (aIdx !== -1 && bIdx !== -1) return aIdx - bIdx;
      if (aIdx !== -1) return -1;
      if (bIdx !== -1) return 1;
      return a.localeCompare(b);
  });

  sortedCats.forEach(cat => {
      const catCommands = grouped[cat];
        
      // Nagłówek sekcji
      const sectionTitle = document.createElement('div');
      sectionTitle.className = 'section-title';
      const icon = catIcons[cat] || '&#9881;';
      sectionTitle.innerHTML = `<span class="icon">${icon}</span> ${escapeHtml(cat)}`;
      commandsList.appendChild(sectionTitle);

      // Komendy w sekcji
      catCommands.forEach((c, i) => {
          const card = document.createElement('div');
          card.className = 'command-card';
          if (animate) {
              card.style.animation = `fadeSlideUp 0.3s ease-out ${(i + sortedCats.indexOf(cat) * 2) * 0.04}s both`;
          }
          card.innerHTML = `
              <div class="cmd-info">
                  <div class="cmd-text">${escapeHtml(c.cmd)}</div>
                  <div class="cmd-desc">${escapeHtml(c.desc)}</div>
              </div>
              <button class="copy-btn" data-copy="${escapeHtml(c.cmd)}">Kopiuj</button>
          `;
          commandsList.appendChild(card);
      });
  });

  document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', handleCopy);
  });
}


// --- MODUŁ 3: Filtrowanie i wyszukiwanie ---

function normalizeText(text) { return text.toLowerCase().replace(/_/g, ' '); }
function normalizeQuery(q) { return q.toLowerCase().replace(/_/g, ' '); }
function matchesQuery(text, query) { const terms = query.split(/\s+/).filter(Boolean); return terms.every(term => text.includes(term)); }


let lastFilteredIds = '';  // do wykrywania zmian — porównujemy ID komend zamiast liczby

function filterCommands(commands) {
    const query = normalizeQuery(searchInput.value.trim());

    // Quickgames zawsze wykluczone z głównej listy — są tylko w sekcji na górze
    let filtered = commands.filter(c => c.cat !== 'quickgames');

    if (activeCategory === 'quickgames') {
        // Kliknięto kategorię quickgames — pokaż "Brak wyników", bo quickgames są tylko w sekcji na górze
        filtered = [];
    } else if (activeCategory !== 'Wszystkie') {
        filtered = filtered.filter(c => c.cat === activeCategory);
    }

    if (query) {
        filtered = filtered.filter(c => {
            return matchesQuery(normalizeText(c.cmd), query) ||
                   matchesQuery(normalizeText(c.desc), query) ||
                   matchesQuery(normalizeText(c.cat), query);
        });
    }

    // Quickgames sekcja: pokaż tylko gdy brak wyszukiwania i kategoria to "Wszystkie" lub "quickgames"
    const showQg = !query && (activeCategory === 'Wszystkie' || activeCategory === 'quickgames');
    quickgamesSection.style.display = showQg ? '' : 'none';

    // Wykryj zmianę — animuj tylko jeśli lista komend się zmieniła (porównujemy ID)
    const currentIds = filtered.map(c => c.cmd).join('|');
    const animate = currentIds !== lastFilteredIds;
    lastFilteredIds = currentIds;

    renderCommands(filtered, animate);
}


// --- MODUŁ 4: Utility (copy, escape) ---

function handleCopy(e) {
    const btn = e.target.closest('.copy-btn');
    if (!btn) return;
    const text = btn.getAttribute('data-copy');
    if (!text) return;

    navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Skopiowano!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Kopiuj'; btn.classList.remove('copied'); }, 1500);
    }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
        btn.textContent = 'Skopiowano!'; btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Kopiuj'; btn.classList.remove('copied'); }, 1500);
    });
}


function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }


// --- MODUŁ 5: Inicjalizacja ---

// Gradient na każdej literze h1
const H1_TEXT = 'CS2 — Komendy do Konsoli';
const GRADIENT_COLORS = [
    '#ff8c42', // jasny pomarańcz
    '#e07a35',
    '#d46f2a',
    '#c96320',
    '#be5816',
    '#b34c0c',
    '#a84002',
    '#9d3400',
    '#922800',
    '#871c00',
    '#7c1000',
    '#710400',
    '#660000',
    '#5a0000',
    '#4e0000',
    '#420000',
    '#360000',
    '#2a0000',
    '#1e0000',
    '#120000',
    '#060000',
    '#000000',
    '#000814',
    '#001028',
    '#00183c',
    '#002050',
    '#002864',
    '#003078',
    '#00388c',
    '#0040a0',
    '#0048b4',
    '#0050c8',
    '#0058dc',
    '#0060f0',
    '#1a72ff', // ciemny niebieski
];

function gradientColor(index, total) {
    const ratio = index / Math.max(total - 1, 1);
    const colorIndex = Math.min(Math.floor(ratio * (GRADIENT_COLORS.length - 1)), GRADIENT_COLORS.length - 1);
    return GRADIENT_COLORS[colorIndex];
}

function renderH1() {
    const h1El = document.getElementById('mainTitle');
    if (!h1El) return;
    
    // Usuń wszystkie znaki specjalne i spacje z gradientu
    let charIndex = 0;
    for (const ch of H1_TEXT) {
        if (ch === ' ') {
            h1El.innerHTML += '&nbsp;';
        } else {
            const span = document.createElement('span');
            span.className = 'h1-letter';
            span.textContent = ch;
            span.style.color = gradientColor(charIndex, H1_TEXT.replace(/ /g, '').length);
            h1El.appendChild(span);
            charIndex++;
        }
    }
}

// Renderuj przyciski FAQ/Donate
function renderTopButtons() {
    const container = document.getElementById('topButtons');
    if (!container) return;
    
    container.innerHTML = `
        <button class="top-btn" onclick="openFaq()">❓ FAQ</button>
        <button class="top-btn" onclick="openDonate()">💛 Donate</button>
    `;
}

  // Renderuj FAQ z pliku JSON
async function loadAndRenderFaq() {
try {
    const res = await fetch('cs/faq_pl.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const faqData = await res.json();
        
    const contentEl = document.getElementById('faqContent');
    if (contentEl && faqData.length > 0) {
        contentEl.innerHTML = faqData.map(item => `
            <div class="faq-item">
                <h3>${escapeHtml(item.q)}</h3>
                <p>${escapeHtml(item.a)}</p>
            </div>
        `).join('');
    }
} catch (err) {
    console.error('Nie udało się załadować FAQ:', err);
}
}

// Renderuj Donate z pliku JSON
async function loadAndRenderDonate() {
try {
    const res = await fetch('cs/donate_pl.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const donateData = await res.json();
        
    const titleEl = document.getElementById('donateTitle');
    const descEl = document.getElementById('donateDesc');
    const methodsEl = document.getElementById('donateMethods');
        
    if (titleEl) titleEl.textContent = donateData.title || 'Wspieraj projekt';
    if (descEl) descEl.innerHTML = donateData.description || '';
    if (methodsEl && donateData.methods) {
        methodsEl.innerHTML = donateData.methods.map(m => `
            <a href="${m.url}" class="donate-method" target="_blank">
                <span class="donate-icon">${m.icon}</span>
                ${escapeHtml(m.name)}
            </a>
        `).join('');
    }
} catch (err) {
    console.error('Nie udało się załadować Donate:', err);
}
}

function openFaq() { document.getElementById('faqModal').classList.add('active'); }
function openDonate() { document.getElementById('donateModal').classList.add('active'); }

searchInput.addEventListener('input', () => filterCommands(commands));

let commands = [];

loadCommands().then(data => {
    commands = data;
    loadingEl.style.display = 'none';
    renderQuickgames(commands);
    renderFilters(commands);
    filterCommands(commands);
});

// Inicjalizacja — gradient h1, przyciski, FAQ, Donate
renderH1();
renderTopButtons();
loadAndRenderFaq();
loadAndRenderDonate();

</script>
</body>
